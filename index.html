<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avanzado de Hipoteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="w-full md:w-1/3 bg-slate-900 text-white p-8">
            <h2 class="text-2xl font-bold mb-6">Configura tu Hipoteca</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Precio de la vivienda (€)</label>
                    <input type="number" id="precio" value="300000" class="w-full bg-slate-800 text-white rounded p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Ahorros aportados (€)</label>
                    <input type="number" id="ahorros" value="60000" class="w-full bg-slate-800 text-white rounded p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Tipo de Interés Anual (%)</label>
                    <input type="number" id="interes" value="2.9" step="0.1" class="w-full bg-slate-800 text-white rounded p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Plazo (Años)</label>
                    <input type="number" id="anos" value="30" class="w-full bg-slate-800 text-white rounded p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button onclick="calcularHipoteca()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition duration-200 mt-4">
                    Calcular Cuota
                </button>
            </div>
        </div>

        <div class="w-full md:w-2/3 p-8 flex flex-col justify-center">
            <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                <div class="bg-slate-100 p-4 rounded-xl">
                    <p class="text-sm text-slate-500 font-semibold uppercase">Cuota Mensual</p>
                    <p class="text-3xl font-bold text-slate-800 mt-1" id="resultadoMensual">0 €</p>
                </div>
                <div class="bg-blue-50 p-4 rounded-xl text-blue-900">
                    <p class="text-sm font-semibold uppercase opacity-80">Total Intereses</p>
                    <p class="text-3xl font-bold mt-1" id="resultadoIntereses">0 €</p>
                </div>
            </div>
            
            <div class="w-full h-64">
                <canvas id="graficoHipoteca"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;

        function calcularHipoteca() {
            const precio = parseFloat(document.getElementById('precio').value);
            const ahorros = parseFloat(document.getElementById('ahorros').value);
            const interesAnual = parseFloat(document.getElementById('interes').value);
            const anos = parseFloat(document.getElementById('anos').value);

            const prestamo = precio - ahorros;
            const interesMensual = (interesAnual / 100) / 12;
            const numeroPagos = anos * 12;

            let cuotaMensual = 0;
            if (interesAnual === 0) {
                cuotaMensual = prestamo / numeroPagos;
            } else {
                cuotaMensual = prestamo * (interesMensual * Math.pow(1 + interesMensual, numeroPagos)) / (Math.pow(1 + interesMensual, numeroPagos) - 1);
            }

            const totalPagado = cuotaMensual * numeroPagos;
            const totalIntereses = totalPagado - prestamo;

            document.getElementById('resultadoMensual').innerText = cuotaMensual.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " €";
            document.getElementById('resultadoIntereses').innerText = totalIntereses.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " €";

            actualizarGrafico(prestamo, totalIntereses);
        }

        function actualizarGrafico(capital, intereses) {
            const ctx = document.getElementById('graficoHipoteca').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Capital Solicitado', 'Intereses a Pagar'],
                    datasets: [{
                        data: [capital, intereses],
                        backgroundColor: ['#1e293b', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // Calcular al cargar la página por primera vez
        window.onload = calcularHipoteca;
    </script>
</body>
</html>
